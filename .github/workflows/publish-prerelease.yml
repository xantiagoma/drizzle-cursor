name: Publish Prerelease

on:
  push:
    branches:
      - "prerelease/alpha/**"
      - "prerelease/beta/**"
  workflow_dispatch:
    inputs:
      channel:
        description: "NPM dist-tag"
        required: true
        default: "beta"
        type: choice
        options:
          - beta
          - alpha

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write

jobs:
  publish-prerelease:
    if: ${{ github.ref != 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || (startsWith(github.ref_name, 'prerelease/alpha/') && 'alpha' || 'beta') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "pnpm"

      - name: Creating .npmrc
        run: |
          cat << EOF > "$HOME/.npmrc"
            //registry.npmjs.org/:_authToken=$NPM_TOKEN
          EOF
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - run: pnpm install --frozen-lockfile

      - name: Ensure branch contains latest main
        run: |
          git fetch origin main
          git merge-base --is-ancestor origin/main HEAD

      - name: Verify quality gates
        run: |
          pnpm run lint
          pnpm exec vitest run
          pnpm run build

      - name: Capture base version
        id: base_version
        run: |
          BASE_VERSION=$(node -p "require('./package.json').version")
          echo "value=$BASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create snapshot prerelease version
        id: snapshot
        run: pnpm changeset version --snapshot ${{ env.CHANNEL }}

      - name: Read published version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Detect publishable prerelease
        id: publishable
        run: |
          BASE='${{ steps.base_version.outputs.value }}'
          NEXT='${{ steps.pkg.outputs.version }}'
          if [ "$BASE" = "$NEXT" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No unreleased changesets found. Skipping prerelease publish."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish prerelease
        if: steps.publishable.outputs.ready == 'true'
        run: pnpm run release:${{ env.CHANNEL }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub prerelease
        if: steps.publishable.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.pkg.outputs.version }}
          CHANNEL: ${{ env.CHANNEL }}
        run: |
          NOTES="Prerelease published from branch $GITHUB_REF_NAME on channel '$CHANNEL'. Install with: npm i drizzle-cursor@$CHANNEL"
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            gh release edit "v$VERSION" --prerelease --title "v$VERSION" --notes "$NOTES"
          else
            gh release create "v$VERSION" --target "$GITHUB_SHA" --prerelease --title "v$VERSION" --notes "$NOTES"
          fi

      - name: Fail when no changeset is present
        if: steps.publishable.outputs.ready != 'true'
        run: |
          echo "No new prerelease version was generated. Add a changeset before publishing alpha/beta."
          exit 1
